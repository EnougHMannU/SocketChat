<!DOCTYPE html>
<html>
<head>
    <title>iOS Chat</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        body {
            background: #e5e5ea;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .chat {
            width: 380px;
            height: 620px;
            background: #f2f2f7;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
        }

        .header {
            padding: 16px;
            text-align: center;
            font-weight: 600;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #ddd;
        }

        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .msg {
            max-width: 70%;
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 20px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .sent {
            align-self: flex-end;
            background: #007aff;
            color: white;
            border-bottom-right-radius: 5px;
        }

        .received {
            align-self: flex-start;
            background: #ffffff;
            color: black;
            border-bottom-left-radius: 5px;
        }

        .inputBox {
            display: flex;
            padding: 10px;
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(10px);
            border-top: 1px solid #ddd;
        }

        .inputBox input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px;
            border-radius: 20px;
            background: #fff;
            font-size: 14px;
        }

        .inputBox button {
            margin-left: 8px;
            border: none;
            background: #007aff;
            color: white;
            padding: 10px 14px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
        }

        .inputBox button:hover {
            background: #005ecb;
        }

        /* smooth scrollbar */
        .messages::-webkit-scrollbar {
            width: 4px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="chat">

    <div class="header">Messages</div>

    <div id="messages" class="messages"></div>

    <div class="inputBox">
        <input id="input" placeholder="iMessage..." />
        <button onclick="sendMsg()">➤</button>
    </div>

</div>

<script src="/socket.io/socket.io.js"></script>

<script>
    const socket = io();
    const messages = document.getElementById("messages");
    const input = document.getElementById("input");

    function sendMsg() {
        if (input.value.trim() !== "") {

            socket.emit("chat message", input.value);

            addMsg(input.value, "sent");

            input.value = "";
        }
    }

    socket.on("chat message", (msg) => {
        addMsg(msg, "received");
    });

    function addMsg(text, type) {
        const div = document.createElement("div");
        div.classList.add("msg", type);
        div.textContent = text;

        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    input.addEventListener("keypress", function(e) {
        if (e.key === "Enter") {
            sendMsg();
        }
    });
</script>

</body>
</html>
